<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sistema de Automatización</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    body {
      font-family: 'Inter', sans-serif;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .gradient-bg {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .input-glow:focus {
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-20px);
      }
    }

    .floating {
      animation: float 6s ease-in-out infinite;
    }

    .error-shake {
      animation: shake 0.3s;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-10px);
      }

      75% {
        transform: translateX(10px);
      }
    }
  </style>
</head>

<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
  <!-- Decorative background elements -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div
      class="absolute top-1/4 left-1/4 w-64 h-64 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 floating">
    </div>
    <div
      class="absolute top-1/3 right-1/4 w-72 h-72 bg-indigo-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 floating"
      style="animation-delay: 2s;"></div>
    <div
      class="absolute bottom-1/4 left-1/3 w-56 h-56 bg-pink-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 floating"
      style="animation-delay: 4s;"></div>
  </div>

  <!-- Login Card -->
  <div class="glass-card rounded-2xl shadow-2xl p-8 w-full max-w-md relative z-10">
    <!-- Logo/Header -->
    <div class="text-center mb-8">
      <div class="inline-block p-3 bg-gradient-to-br from-purple-500 to-indigo-600 rounded-2xl mb-4">
        <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
          </path>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-white mb-2">Bienvenido</h1>
      <p class="text-gray-300">Sistema de Automatización de Edificios</p>
      <p class="text-sm text-gray-400 mt-1">Alto La Serena 4</p>
    </div>

    <!-- Error Message -->
    <div id="errorMessage" class="hidden mb-4 p-4 bg-red-500 bg-opacity-20 border border-red-500 rounded-lg">
      <p class="text-red-200 text-sm text-center" id="errorText"></p>
    </div>

    <!-- Login Form -->
    <form id="loginForm" class="space-y-6">
      <!-- Username -->
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Usuario</label>
        <input type="text" id="username" name="username" required placeholder="Ingresa tu usuario"
          class="input-glow w-full px-4 py-3 bg-white bg-opacity-5 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-purple-500 transition-all">
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Contraseña</label>
        <input type="password" id="password" name="password" required placeholder="Ingresa tu contraseña"
          class="input-glow w-full px-4 py-3 bg-white bg-opacity-5 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-purple-500 transition-all">
      </div>

      <!-- Remember Me -->
      <div class="flex items-center">
        <input type="checkbox" id="remember"
          class="w-4 h-4 text-purple-600 bg-gray-700 border-gray-600 rounded focus:ring-purple-500">
        <label for="remember" class="ml-2 text-sm text-gray-300">Recordar sesión</label>
      </div>

      <!-- Submit Button -->
      <button type="submit" id="loginButton"
        class="w-full py-3 px-4 bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-700 hover:to-indigo-700 text-white font-semibold rounded-lg shadow-lg hover:shadow-xl transform hover:scale-[1.02] transition-all duration-200 flex items-center justify-center">
        <span id="buttonText">Iniciar Sesión</span>
        <svg id="buttonSpinner" class="hidden animate-spin ml-2 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
          </path>
        </svg>
      </button>
    </form>

    <!-- Demo Credentials Info -->
    <div class="mt-6 p-4 bg-blue-500 bg-opacity-10 border border-blue-500 border-opacity-30 rounded-lg">
      <p class="text-xs text-blue-200 font-semibold mb-2">👤 Usuarios de Prueba:</p>
      <div class="text-xs text-blue-100 space-y-1">
        <p><span class="font-mono">admin</span> / <span class="font-mono">Admin2024!</span> (Admin)</p>
        <p><span class="font-mono">comite1</span> / <span class="font-mono">Comite2024!</span> (Comité)</p>
        <p><span class="font-mono">usuario1</span> / <span class="font-mono">User2024!</span> (Usuario)</p>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorDiv = document.getElementById('errorMessage');
    const errorText = document.getElementById('errorText');
    const loginButton = document.getElementById('loginButton');
    const buttonText = document.getElementById('buttonText');
    const buttonSpinner = document.getElementById('buttonSpinner');

    function showError(message) {
      errorText.textContent = message;
      errorDiv.classList.remove('hidden');
      errorDiv.classList.add('error-shake');
      setTimeout(() => errorDiv.classList.remove('error-shake'), 300);
    }

    function hideError() {
      errorDiv.classList.add('hidden');
    }

    function setLoading(loading) {
      if (loading) {
        loginButton.disabled = true;
        buttonText.textContent = 'Iniciando...';
        buttonSpinner.classList.remove('hidden');
      } else {
        loginButton.disabled = false;
        buttonText.textContent = 'Iniciar Sesión';
        buttonSpinner.classList.add('hidden');
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      setLoading(true);

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          credentials: 'same-origin',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          // Success! Redirect to main app
          window.location.href = '/conserje.html';
        } else {
          showError(data.error || 'Credenciales inválidas');
          setLoading(false);
        }
      } catch (error) {
        showError('Error de conexión. Intenta nuevamente.');
        setLoading(false);
      }
    });

    // Auto-focus username field
    document.getElementById('username').focus();
  </script>
</body>

</html>
