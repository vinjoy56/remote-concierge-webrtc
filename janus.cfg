# General configuration
general: {
        configs_folder = "/opt/janus/etc/janus"
        plugins_folder = "/opt/janus/lib/janus/plugins"
        transports_folder = "/opt/janus/lib/janus/transports"
        events_folder = "/opt/janus/lib/janus/events"
        loggers_folder = "/opt/janus/lib/janus/loggers"
        debug_level = 4
        debug_timestamps = true
        debug_colors = true
        log_prefix = "[janus] "
}

# Certificates
certificates: {
        # Autogenera certificados
}

# Media
media: {
        # Configuración por defecto
}

# NAT
nat: {
        nice_debug = false
        ice_ignore_list = "vmnet"
}

# Plugins
plugins: {
        # Todos habilitados por defecto
}

# TRANSPORTES - ESTA ES LA PARTE QUE TE FALTABA
transports: {
        janus.transport.http = yes
        janus.transport.websockets = yes
        janus.transport.pfunix = yes
}

# Configuración específica de WebSocket
transport_websockets: {
        ws = yes
        wss = yes
        ws_interface = 0.0.0.0
        ws_port = 8188
        wss_interface = 0.0.0.0
        wss_port = 8989
        admin_ws = yes
        admin_wss = yes
        admin_ws_interface = 0.0.0.0
        admin_ws_port = 7188
        admin_wss_interface = 0.0.0.0
        admin_wss_port = 7989
}

# Loggers
loggers: {
        # Todos habilitados por defecto
}

# Events
events: {
        broadcast = false
        stats_period = 5
}